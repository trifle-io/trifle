version: "3.7"
name: "trifle"
services:
  redis:
    image: redis:latest
    restart: unless-stopped
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
      MINIO_REGION_NAME: us-east-1
    restart: unless-stopped
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - trifle_minio_data:/data
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minio miniosecret; do sleep 1; done &&
      mc mb --ignore-existing local/trifle-sqlite-files
      "
  mongo:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - 27017:27017
    expose:
      - 27017
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: trifle_dev
    restart: unless-stopped
  app:
    command: /bin/sh -c "while sleep 1000; do :; done"
    env_file:
      - .env
    build:
      context: .
      dockerfile: .devops/docker/local/Dockerfile
    depends_on:
      - redis
      - minio
      - minio-init
      - mongo
      - postgres
    environment:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      ELIXIR_ERL_OPTIONS: "+fnu"
      PGHOST: postgres
      PGUSER: postgres
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379
    ports:
      - 4000:4000
    volumes:
      - .:/workspaces/trifle:cached
      - trifle_deps:/workspaces/trifle/deps
      - trifle_build:/workspaces/trifle/_build
      - ../trifle_stats:/workspaces/trifle_stats
    working_dir: /workspaces/trifle
volumes:
  trifle_deps:
  trifle_build:
  trifle_minio_data:
